<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>90天日课 · 打卡</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#1a1a2e;
  --card:#16213e;
  --gold:#e2b97a;
  --green:#3ecf8e;
  --red:#ff6b6b;
  --text:#ccd6f6;
  --dim:#8892b0;
  --border:rgba(226,185,122,0.15);
}
body{
  font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  padding:16px;
  padding-bottom:100px;
}
.header{
  text-align:center;
  padding:20px 0 16px;
}
.header h1{
  color:var(--gold);
  font-size:22px;
  font-weight:400;
  letter-spacing:4px;
}
.header .sub{
  color:var(--dim);
  font-size:12px;
  margin-top:4px;
}
.header .day-badge{
  display:inline-block;
  background:var(--gold);
  color:var(--bg);
  font-size:28px;
  font-weight:600;
  padding:4px 20px;
  border-radius:30px;
  margin-top:8px;
}
.progress-bar{
  background:rgba(255,255,255,0.06);
  border-radius:10px;
  height:8px;
  margin:12px 0 4px;
  overflow:hidden;
}
.progress-fill{
  height:100%;
  background:linear-gradient(90deg,var(--gold),var(--green));
  border-radius:10px;
  transition:width 0.5s;
}
.progress-label{
  display:flex;
  justify-content:space-between;
  font-size:11px;
  color:var(--dim);
}

.card{
  background:var(--card);
  border-radius:16px;
  padding:20px;
  margin-bottom:12px;
  border:1px solid var(--border);
}
.card-title{
  color:var(--gold);
  font-size:14px;
  font-weight:500;
  margin-bottom:12px;
  letter-spacing:1px;
}
.card-title .num{
  display:inline-block;
  background:var(--gold);
  color:var(--bg);
  font-size:11px;
  padding:1px 8px;
  border-radius:10px;
  margin-right:6px;
}

.form-group{
  margin-bottom:14px;
}
.form-group label{
  display:block;
  font-size:13px;
  color:var(--dim);
  margin-bottom:5px;
  line-height:1.4;
}
.form-group textarea{
  width:100%;
  background:rgba(255,255,255,0.04);
  border:1px solid var(--border);
  border-radius:10px;
  color:var(--text);
  font-size:14px;
  padding:12px;
  resize:vertical;
  min-height:60px;
  font-family:inherit;
  line-height:1.5;
}
.form-group textarea::placeholder{color:#555}
.form-group textarea:focus{outline:none;border-color:var(--gold)}

.three-check{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:8px;
  margin-bottom:14px;
}
.check-item{
  background:rgba(255,255,255,0.04);
  border:1px solid var(--border);
  border-radius:10px;
  text-align:center;
  padding:12px 4px;
  cursor:pointer;
  transition:all 0.2s;
  user-select:none;
}
.check-item.active-yes{
  background:rgba(62,207,142,0.15);
  border-color:var(--green);
}
.check-item.active-no{
  background:rgba(255,107,107,0.15);
  border-color:var(--red);
}
.check-item .emoji{font-size:22px;display:block;margin-bottom:4px}
.check-item .label{font-size:11px;color:var(--dim)}

.btn-submit{
  display:block;
  width:100%;
  padding:16px;
  background:var(--gold);
  color:var(--bg);
  border:none;
  border-radius:14px;
  font-size:17px;
  font-weight:600;
  cursor:pointer;
  letter-spacing:2px;
  margin-top:8px;
  transition:opacity 0.2s;
}
.btn-submit:active{opacity:0.7}
.btn-submit:disabled{opacity:0.3;cursor:default}

.calendar{
  display:grid;
  grid-template-columns:repeat(10,1fr);
  gap:4px;
  margin:8px 0;
}
.cal-day{
  aspect-ratio:1;
  border-radius:6px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:11px;
  font-weight:500;
  background:rgba(255,255,255,0.04);
  color:var(--dim);
  position:relative;
}
.cal-day.done{
  background:var(--green);
  color:var(--bg);
}
.cal-day.today{
  border:2px solid var(--gold);
}
.cal-day .num-small{
  font-size:9px;
  position:absolute;
  top:1px;
  left:3px;
  opacity:0.5;
}
.cal-label{
  text-align:center;
  font-size:10px;
  color:var(--dim);
  margin-bottom:4px;
}

.view-btn{
  background:none;
  border:1px solid var(--border);
  color:var(--dim);
  padding:8px 16px;
  border-radius:20px;
  font-size:12px;
  cursor:pointer;
  transition:all 0.2s;
}
.view-btn.active{
  border-color:var(--gold);
  color:var(--gold);
}

.toast{
  position:fixed;
  bottom:80px;
  left:50%;
  transform:translateX(-50%);
  background:var(--green);
  color:var(--bg);
  padding:12px 24px;
  border-radius:30px;
  font-size:14px;
  font-weight:500;
  opacity:0;
  transition:opacity 0.3s;
  pointer-events:none;
  z-index:100;
}
.toast.show{opacity:1}

.entry-list{
  margin-top:8px;
}
.entry-item{
  background:rgba(255,255,255,0.02);
  border-radius:10px;
  padding:12px;
  margin-bottom:6px;
  border-left:3px solid var(--gold);
  font-size:13px;
  line-height:1.5;
}
.entry-item .date{
  color:var(--gold);
  font-size:11px;
  margin-bottom:4px;
}
.entry-item .content{color:var(--text)}
.entry-item .sanjie{
  color:var(--dim);
  font-size:12px;
  margin-top:6px;
  padding-top:6px;
  border-top:1px solid var(--border);
}

.hidden{display:none}

.tabs{
  display:flex;
  gap:8px;
  margin-bottom:16px;
}
</style>
</head>
<body>

<div class="header">
  <h1>日课 · 打卡</h1>
  <div class="sub">正见 · 正思维 | 90天</div>
  <div class="day-badge" id="dayBadge">Day 1</div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:1%"></div></div>
  <div class="progress-label"><span id="dayLabel">第1天</span><span>90</span></div>
</div>

<div class="tabs">
  <button class="view-btn active" id="tabCheck" onclick="showTab('check')">打卡</button>
  <button class="view-btn" id="tabView" onclick="showTab('view')">日历</button>
  <button class="view-btn" id="tabRecords" onclick="showTab('records')">记录</button>
  <button class="view-btn" onclick="exportData()">📥 导出</button>
</div>

<!-- 打卡区 -->
<div id="panelCheck">
  <div class="card">
    <div class="card-title"><span class="num">①</span>为自己做的一件事</div>
    <div class="form-group">
      <textarea id="inputSelf" placeholder="今天有没有一件事是完全只为自己做的？哪怕10分钟..." rows="2"></textarea>
    </div>
  </div>

  <div class="card">
    <div class="card-title"><span class="num">②</span>身体信号</div>
    <div class="form-group">
      <textarea id="inputBody" placeholder="身体有没有发信号？我怎么回应的？" rows="2"></textarea>
    </div>
  </div>

  <div class="card">
    <div class="card-title"><span class="num">③</span>问了"那我自己呢"吗？</div>
    <div class="three-check">
      <div class="check-item" onclick="toggleCheck(this,'asked-yes')">
        <span class="emoji">✅</span><span class="label">问了</span>
      </div>
      <div class="check-item" onclick="toggleCheck(this,'asked-no')">
        <span class="emoji">❌</span><span class="label">没问</span>
      </div>
      <div class="check-item" onclick="toggleCheck(this,'asked-mid')">
        <span class="emoji">🤔</span><span class="label">忘了</span>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title"><span class="num">⭕</span>三界觉察</div>
    <div class="form-group">
      <textarea id="inputBodyFeel" placeholder="身体有什么感受？" rows="1"></textarea>
    </div>
    <div class="form-group">
      <textarea id="inputEmotion" placeholder="有什么情绪？" rows="1"></textarea>
    </div>
    <div class="form-group">
      <textarea id="inputThought" placeholder="有什么想法？" rows="2"></textarea>
    </div>
  </div>

  <button class="btn-submit" onclick="submitCheckin()">提交打卡</button>
</div>

<!-- 日历区 -->
<div id="panelView" class="hidden">
  <div class="card">
    <div class="card-title">打卡日历</div>
    <div class="cal-label">已完成 / 总计</div>
    <div class="calendar" id="calendarGrid"></div>
  </div>
</div>

<!-- 记录区 -->
<div id="panelRecords" class="hidden">
  <div class="card">
    <div class="card-title">打卡记录</div>
    <div id="recordsList" class="entry-list">
      <div style="text-align:center;color:var(--dim);padding:20px;font-size:13px;">还没有打卡记录</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY = 'riji_90day_checkin';
const START_DATE = '2026-07-08';
const TOTAL_DAYS = 90;

function getData(){
  try{return JSON.parse(localStorage.getItem(STORAGE_KEY))||{}}catch{return{}}
}
function saveData(d){
  localStorage.setItem(STORAGE_KEY,JSON.stringify(d));
}
function todayKey(){
  const d=new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function dayNumber(dateStr){
  const start=new Date(START_DATE);
  const cur=new Date(dateStr);
  const diff=Math.floor((cur-start)/(86400000))+1;
  return Math.max(1,Math.min(diff,TOTAL_DAYS));
}
function todayNumber(){
  return dayNumber(todayKey());
}

let askedVal='';

function toggleCheck(el,val){
  const parent=el.parentElement;
  parent.querySelectorAll('.check-item').forEach(c=>{
    c.classList.remove('active-yes','active-no');
  });
  if(el.classList.contains('active-yes')||el.classList.contains('active-no')){
    askedVal='';
    return;
  }
  if(val==='asked-yes') el.classList.add('active-yes');
  else el.classList.add('active-no');
  askedVal=val==='asked-yes'?'问了':val==='asked-no'?'没问':'忘了';
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

function submitCheckin(){
  const key=todayKey();
  const data=getData();
  if(data[key]){
    if(!confirm('今天已经打过卡了，要覆盖吗？')) return;
  }
  
  const selfVal=document.getElementById('inputSelf').value.trim();
  const bodyVal=document.getElementById('inputBody').value.trim();
  const bodyFeel=document.getElementById('inputBodyFeel').value.trim();
  const emotion=document.getElementById('inputEmotion').value.trim();
  const thought=document.getElementById('inputThought').value.trim();

  if(!selfVal&&!bodyVal&&!bodyFeel&&!emotion&&!thought&&!askedVal){
    showToast('写点什么再提交吧');
    return;
  }

  const entry={
    date:key,
    day:todayNumber(),
    self:selfVal,
    body:bodyVal,
    asked:askedVal,
    bodyFeel,
    emotion,
    thought,
    timestamp:new Date().toISOString()
  };
  data[key]=entry;
  saveData(data);
  showToast('Day '+entry.day+' 已保存');
  askedVal='';
  resetForm();
  renderAll();
}

function resetForm(){
  document.getElementById('inputSelf').value='';
  document.getElementById('inputBody').value='';
  document.getElementById('inputBodyFeel').value='';
  document.getElementById('inputEmotion').value='';
  document.getElementById('inputThought').value='';
  document.querySelectorAll('.check-item').forEach(c=>c.classList.remove('active-yes','active-no'));
  askedVal='';
}

function renderHeader(){
  const dn=todayNumber();
  document.getElementById('dayBadge').textContent='Day '+Math.min(dn,90);
  document.getElementById('dayLabel').textContent='第'+Math.min(dn,90)+'天';
  const pct=Math.round((Math.min(dn,90)/90)*100);
  document.getElementById('progressFill').style.width=pct+'%';
}

function renderCalendar(){
  const grid=document.getElementById('calendarGrid');
  grid.innerHTML='';
  const data=getData();
  for(let i=1;i<=TOTAL_DAYS;i++){
    const d=new Date(START_DATE);
    d.setDate(d.getDate()+i-1);
    const key=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    const div=document.createElement('div');
    div.className='cal-day';
    if(data[key]) div.classList.add('done');
    if(key===todayKey()) div.classList.add('today');
    const num=document.createElement('span');
    num.className='num-small';
    num.textContent=i;
    div.appendChild(num);
    // show a small indicator
    if(data[key]){
      const dot=document.createElement('span');
      dot.style.fontSize='16px';
      dot.textContent='✓';
      div.appendChild(dot);
    }
    grid.appendChild(div);
  }
}

function renderRecords(){
  const list=document.getElementById('recordsList');
  const data=getData();
  const entries=Object.values(data).sort((a,b)=>b.timestamp.localeCompare(a.timestamp));
  if(entries.length===0){
    list.innerHTML='<div style="text-align:center;color:var(--dim);padding:20px;font-size:13px;">还没有打卡记录</div>';
    return;
  }
  list.innerHTML='';
  entries.forEach(e=>{
    const div=document.createElement('div');
    div.className='entry-item';
    let html='<div class="date">Day '+e.day+' · '+e.date+'</div>';
    html+='<div class="content">';
    if(e.self) html+='<div>✦ '+esc(e.self)+'</div>';
    if(e.body) html+='<div>✦ '+esc(e.body)+'</div>';
    if(e.asked) html+='<div>✦ 问了自己吗：'+esc(e.asked)+'</div>';
    html+='</div>';
    if(e.bodyFeel||e.emotion||e.thought){
      html+='<div class="sanjie">';
      if(e.bodyFeel) html+='身体：'+esc(e.bodyFeel)+'<br>';
      if(e.emotion) html+='情绪：'+esc(e.emotion)+'<br>';
      if(e.thought) html+='想法：'+esc(e.thought);
      html+='</div>';
    }
    div.innerHTML=html;
    list.appendChild(div);
  });
}

function esc(s){return s.replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function showTab(tab){
  document.querySelectorAll('.view-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('panelCheck').classList.add('hidden');
  document.getElementById('panelView').classList.add('hidden');
  document.getElementById('panelRecords').classList.add('hidden');
  if(tab==='check'){
    document.getElementById('tabCheck').classList.add('active');
    document.getElementById('panelCheck').classList.remove('hidden');
  }else if(tab==='view'){
    document.getElementById('tabView').classList.add('active');
    document.getElementById('panelView').classList.remove('hidden');
    renderCalendar();
  }else{
    document.getElementById('tabRecords').classList.add('active');
    document.getElementById('panelRecords').classList.remove('hidden');
    renderRecords();
  }
}

function renderAll(){
  renderHeader();
}

function exportData(){
  const data=JSON.parse(localStorage.getItem('riji_90day_checkin'))||{};
  const entries=Object.values(data).sort((a,b)=>a.timestamp.localeCompare(b.timestamp));
  if(entries.length===0){
    showToast('还没有打卡记录可导出');
    return;
  }
  const blob=new Blob([JSON.stringify(entries,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download='90riji-export-'+new Date().toISOString().slice(0,10)+'.json';
  a.click();
  URL.revokeObjectURL(url);
  showToast('已导出 '+entries.length+' 条记录');
}

// init
renderAll();
</script>
</body>
</html>
