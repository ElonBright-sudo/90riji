<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>日课 · 梦记</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#1a1a2e;--card:#16213e;--gold:#e2b97a;--purple:#b48cdc;--green:#3ecf8e;--red:#ff6b6b;--text:#ccd6f6;--dim:#8892b0;--border:rgba(226,185,122,0.15);--pborder:rgba(180,140,220,0.2)}
body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:16px;padding-bottom:100px}

/* ========== 入口 ========== */
.entry{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;gap:24px}
.entry h1{color:var(--gold);font-size:26px;font-weight:400;letter-spacing:6px;text-align:center}
.entry .sub{color:var(--dim);font-size:13px;text-align:center;margin-bottom:16px;line-height:1.6}
.entry-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;width:260px;padding:32px 20px;border-radius:20px;cursor:pointer;transition:all 0.2s;text-decoration:none;gap:8px}
.entry-btn:active{transform:scale(0.97)}
.entry-btn .icon{font-size:40px}
.entry-btn .name{font-size:18px;font-weight:500}
.entry-btn .desc{font-size:12px;opacity:0.7}
.btn-evening{background:var(--card);border:1px solid var(--border);color:var(--gold)}
.btn-evening:active{background:rgba(226,185,122,0.1)}
.btn-morning{background:var(--card);border:1px solid var(--pborder);color:var(--purple)}
.btn-morning:active{background:rgba(180,140,220,0.1)}
.entry-footer{margin-top:32px;font-size:11px;color:var(--dim);text-align:center;line-height:1.8}

/* ========== 通用 ========== */
.header{text-align:center;padding:20px 0 16px}
.header h1{font-size:22px;font-weight:400;letter-spacing:4px}
.header .sub{color:var(--dim);font-size:12px;margin-top:4px}
.badge{display:inline-block;border-radius:30px;margin-top:8px;font-weight:600}
.badge-gold{background:var(--gold);color:var(--bg);font-size:28px;padding:4px 20px}
.badge-purple{background:var(--purple);color:var(--bg);font-size:14px;padding:4px 16px}
.progress-bar{background:rgba(255,255,255,0.06);border-radius:10px;height:8px;margin:12px 0 4px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--green));border-radius:10px;transition:width 0.5s}
.progress-label{display:flex;justify-content:space-between;font-size:11px;color:var(--dim)}
.card{background:var(--card);border-radius:16px;padding:20px;margin-bottom:12px;border:1px solid var(--border)}
.card-gold{border-color:var(--border)}
.card-purple{border-color:var(--pborder)}
.card-title{font-size:14px;font-weight:500;margin-bottom:12px;letter-spacing:1px}
.card-title .num{display:inline-block;font-size:11px;padding:1px 8px;border-radius:10px;margin-right:6px}
.c-title-gold{color:var(--gold)}.c-title-gold .num{background:var(--gold);color:var(--bg)}
.c-title-purple{color:var(--purple)}.c-title-purple .num{background:var(--purple);color:var(--bg)}
.form-group{margin-bottom:14px}
.form-group textarea{width:100%;background:rgba(255,255,255,0.04);border-radius:10px;color:var(--text);font-size:14px;padding:12px;resize:vertical;min-height:60px;font-family:inherit;line-height:1.5}
.form-group textarea::placeholder{color:#555}
.form-group textarea:focus{outline:none}
.ta-gold{border:1px solid var(--border)}.ta-gold:focus{border-color:var(--gold)}
.ta-purple{border:1px solid var(--pborder)}.ta-purple:focus{border-color:var(--purple)}
.three-check{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.check-item{background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:10px;text-align:center;padding:12px 4px;cursor:pointer;transition:all 0.2s;user-select:none}
.check-item.active-yes{background:rgba(62,207,142,0.15);border-color:var(--green)}
.check-item.active-no{background:rgba(255,107,107,0.15);border-color:var(--red)}
.check-item .emoji{font-size:22px;display:block;margin-bottom:4px}
.check-item .label{font-size:11px;color:var(--dim)}
.btn-submit{display:block;width:100%;padding:16px;border:none;border-radius:14px;font-size:17px;font-weight:600;cursor:pointer;letter-spacing:2px;margin-top:8px;transition:opacity 0.2s}
.btn-submit:active{opacity:0.7}
.btn-gold{background:var(--gold);color:var(--bg)}
.btn-purple{background:var(--purple);color:var(--bg)}
.btn-back{background:none;border:1px solid var(--border);color:var(--dim);padding:8px 16px;border-radius:20px;font-size:12px;cursor:pointer;margin-bottom:12px;transition:all 0.2s}
.btn-back:hover{border-color:var(--gold);color:var(--gold)}
.calendar{display:grid;gap:4px;margin:8px 0}
.cal-e{grid-template-columns:repeat(10,1fr)}
.cal-m{grid-template-columns:repeat(7,1fr)}
.cal-day{aspect-ratio:1;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;background:rgba(255,255,255,0.04);color:var(--dim);position:relative;flex-direction:column}
.cal-day.done{color:var(--bg)}
.cal-day.done-gold{background:var(--green)}
.cal-day.done-purple{background:var(--purple)}
.cal-day.today{border:2px solid var(--gold)}
.cal-day .num-small{font-size:9px;position:absolute;top:1px;left:3px;opacity:0.5}
.cal-label{text-align:center;font-size:10px;color:var(--dim);margin-bottom:4px}
.view-btn{background:none;border:1px solid var(--border);color:var(--dim);padding:6px 12px;border-radius:20px;font-size:11px;cursor:pointer;transition:all 0.2s;white-space:nowrap}
.view-btn.active-gold{border-color:var(--gold);color:var(--gold)}
.view-btn.active-purple{border-color:var(--purple);color:var(--purple)}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);padding:12px 24px;border-radius:30px;font-size:14px;font-weight:500;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:100;color:var(--bg)}
.toast.show{opacity:1}
.toast-gold{background:var(--gold)}
.toast-purple{background:var(--purple)}
.entry-list{margin-top:8px}
.entry-item{background:rgba(255,255,255,0.02);border-radius:10px;padding:12px;margin-bottom:6px;font-size:13px;line-height:1.5}
.entry-item .date{font-size:11px;margin-bottom:4px}
.entry-item .content{color:var(--text)}
.entry-item .sanjie{color:var(--dim);font-size:12px;margin-top:6px;padding-top:6px;border-top:1px solid var(--border)}
.entry-item .dream-line{padding:2px 0}
.entry-item .dream-line .tag{font-size:11px}
.e-item{border-left:3px solid var(--gold)}
.e-item .date{color:var(--gold)}
.m-item{border-left:3px solid var(--purple)}
.m-item .date{color:var(--purple)}
.m-item .dream-line .tag{color:var(--dim)}
.hidden{display:none}
.tabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px;justify-content:center}
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);z-index:9998;display:flex;align-items:center;justify-content:center}
.modal-box{background:var(--card);border-radius:16px;padding:20px;width:90%;max-width:420px;max-height:80vh;overflow-y:auto}
.modal-box textarea{width:100%;min-height:120px;background:rgba(255,255,255,0.04);border-radius:10px;color:var(--text);font-size:12px;padding:12px;font-family:monospace;resize:vertical;border:1px solid var(--border)}
.modal-title{font-size:15px;font-weight:500;margin-bottom:12px;text-align:center}
.modal-actions{display:flex;gap:8px;margin-top:12px;justify-content:center}
.modal-actions button{flex:1;max-width:140px;padding:10px;border-radius:20px;font-size:13px;font-weight:500;cursor:pointer;border:none;transition:opacity 0.2s}
.btn-pri-gold{background:var(--gold);color:var(--bg)}
.btn-pri-purple{background:var(--purple);color:var(--bg)}
.btn-sec{background:rgba(255,255,255,0.08);color:var(--text);border:1px solid var(--border)!important}
@media(max-width:480px){body{padding:10px;padding-bottom:80px}.card{padding:14px}.tabs{gap:4px}.view-btn{padding:5px 10px;font-size:10px}.header h1{font-size:18px}.badge-gold{font-size:22px;padding:3px 16px}}
</style>
</head>
<body>

<!-- ========== 入口页 ========== -->
<div id="pageEntry">
  <div class="entry">
    <div>
      <h1>日课 · 梦记</h1>
      <div class="sub">一天两次觉察<br>早上记梦 · 睡前回顾</div>
    </div>
    <div class="entry-btn btn-morning" onclick="goTo('dream')">
      <div class="icon">🌅</div>
      <div class="name">晨间梦记</div>
      <div class="desc">醒来三行 · 记梦</div>
    </div>
    <div class="entry-btn btn-evening" onclick="goTo('evening')">
      <div class="icon">🌙</div>
      <div class="name">晚间日课</div>
      <div class="desc">正见 · 正思维 · 三界觉察</div>
    </div>
    <div class="entry-footer">
      AxureShow · 跨设备用备份码同步
    </div>
  </div>
</div>

<!-- ========== 晨间梦记 ========== -->
<div id="pageDream" class="hidden">
<div class="header">
  <button class="btn-back" onclick="goTo('entry')">← 返回</button>
  <h1 style="color:var(--purple)">🌅 晨间梦记</h1>
  <div class="sub">醒来第一件事 · 记梦</div>
  <div class="badge badge-purple" id="dreamDateBadge">今天</div>
</div>
<div class="tabs">
  <button class="view-btn active-purple" id="dTabCheck" onclick="showDTab('check')">📝 记梦</button>
  <button class="view-btn" id="dTabView" onclick="showDTab('view')">📅 日历</button>
  <button class="view-btn" id="dTabRecords" onclick="showDTab('records')">📋 记录</button>
  <button class="view-btn" onclick="dExport()">📥 导出</button>
  <button class="view-btn" onclick="document.getElementById('dImport').click()">📤 导入</button>
  <button class="view-btn" onclick="dBackup()">🔐 备份码</button>
  <input type="file" id="dImport" accept=".json" style="display:none" onchange="dImportData(event)">
</div>
<div id="dPanelCheck">
  <div class="card card-purple">
    <div class="card-title c-title-purple"><span class="num">①</span>身体/情绪</div>
    <div class="form-group"><textarea id="dBody" class="ta-purple" placeholder="梦记从身体端开始长——醒来时身体有什么感受？什么情绪？" rows="2"></textarea></div>
  </div>
  <div class="card card-purple">
    <div class="card-title c-title-purple"><span class="num">②</span>画面</div>
    <div class="form-group"><textarea id="dScene" class="ta-purple" placeholder="梦里看到了什么画面？场景是什么样的？" rows="2"></textarea></div>
  </div>
  <div class="card card-purple">
    <div class="card-title c-title-purple"><span class="num">③</span>故事</div>
    <div class="form-group"><textarea id="dStory" class="ta-purple" placeholder="梦到了什么故事？&#10;不记得就写：无梦，无梦也是记录，不是失败。" rows="3"></textarea></div>
  </div>
  <button class="btn-submit btn-purple" onclick="dSubmit()">提交梦记</button>
</div>
<div id="dPanelView" class="hidden">
  <div class="card card-purple"><div class="card-title c-title-purple">梦记日历</div><div class="cal-label">有记录 / 当月</div><div class="calendar cal-m" id="dCalendar"></div></div>
</div>
<div id="dPanelRecords" class="hidden">
  <div class="card card-purple"><div class="card-title c-title-purple">梦记记录</div><div id="dRecords" class="entry-list"><div style="text-align:center;color:var(--dim);padding:20px;font-size:13px;">还没有梦记记录</div></div></div>
</div>
</div>

<!-- ========== 晚间日课 ========== -->
<div id="pageEvening" class="hidden">
<div class="header">
  <button class="btn-back" onclick="goTo('entry')">← 返回</button>
  <h1 style="color:var(--gold)">🌙 晚间日课</h1>
  <div class="sub">正见 · 正思维 | 90天</div>
  <div class="badge badge-gold" id="eDayBadge">Day 1</div>
  <div class="progress-bar"><div class="progress-fill" id="eProgress" style="width:1%"></div></div>
  <div class="progress-label"><span id="eDayLabel">第1天</span><span>90</span></div>
</div>
<div class="tabs">
  <button class="view-btn active-gold" id="eTabCheck" onclick="showETab('check')">📝 打卡</button>
  <button class="view-btn" id="eTabView" onclick="showETab('view')">📅 日历</button>
  <button class="view-btn" id="eTabRecords" onclick="showETab('records')">📋 记录</button>
  <button class="view-btn" onclick="eExport()">📥 导出</button>
  <button class="view-btn" onclick="document.getElementById('eImport').click()">📤 导入</button>
  <button class="view-btn" onclick="eBackup()">🔐 备份码</button>
  <input type="file" id="eImport" accept=".json" style="display:none" onchange="eImportData(event)">
</div>
<div id="ePanelCheck">
  <div class="card">
    <div class="card-title c-title-gold"><span class="num">①</span>为自己做的一件事</div>
    <div class="form-group"><textarea id="eSelf" class="ta-gold" placeholder="今天有没有一件事是完全只为自己做的？哪怕10分钟..." rows="2"></textarea></div>
  </div>
  <div class="card">
    <div class="card-title c-title-gold"><span class="num">②</span>身体信号</div>
    <div class="form-group"><textarea id="eBody" class="ta-gold" placeholder="身体有没有发信号？我怎么回应的？" rows="2"></textarea></div>
  </div>
  <div class="card">
    <div class="card-title c-title-gold"><span class="num">③</span>问了"那我自己呢"吗？</div>
    <div class="three-check">
      <div class="check-item" onclick="eToggle(this,'yes')"><span class="emoji">✅</span><span class="label">问了</span></div>
      <div class="check-item" onclick="eToggle(this,'no')"><span class="emoji">❌</span><span class="label">没问</span></div>
      <div class="check-item" onclick="eToggle(this,'mid')"><span class="emoji">🤔</span><span class="label">忘了</span></div>
    </div>
  </div>
  <div class="card">
    <div class="card-title c-title-gold"><span class="num">⭕</span>三界觉察</div>
    <div class="form-group"><textarea id="eBodyFeel" class="ta-gold" placeholder="身体有什么感受？" rows="1"></textarea></div>
    <div class="form-group"><textarea id="eEmotion" class="ta-gold" placeholder="有什么情绪？" rows="1"></textarea></div>
    <div class="form-group"><textarea id="eThought" class="ta-gold" placeholder="有什么想法？" rows="2"></textarea></div>
  </div>
  <button class="btn-submit btn-gold" onclick="eSubmit()">提交晚间日课</button>
</div>
<div id="ePanelView" class="hidden">
  <div class="card"><div class="card-title c-title-gold">日课打卡日历</div><div class="cal-label">已完成 / 总计</div><div class="calendar cal-e" id="eCalendar"></div></div>
</div>
<div id="ePanelRecords" class="hidden">
  <div class="card"><div class="card-title c-title-gold">日课打卡记录</div><div id="eRecords" class="entry-list"><div style="text-align:center;color:var(--dim);padding:20px;font-size:13px;">还没有打卡记录</div></div></div>
</div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===== 导航 =====
function goTo(page){['pageEntry','pageDream','pageEvening'].forEach(p=>document.getElementById(p).classList.add('hidden'));document.getElementById('page'+page.charAt(0).toUpperCase()+page.slice(1)).classList.remove('hidden');if(page==='dream'){dRenderAll()}else if(page==='evening'){eRenderAll()}}

// ===== Toast =====
function toast(msg,cls){const t=document.getElementById('toast');t.textContent=msg;t.className='toast '+cls+' show';setTimeout(()=>t.classList.remove('show'),2000)}

// ===================== 晨间梦记 =====================
const DK='riji_dream_checkin';
function dGet(){try{return JSON.parse(localStorage.getItem(DK))||{}}catch{return{}}}
function dSet(d){localStorage.setItem(DK,JSON.stringify(d))}
function tKey(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function mDays(){const n=new Date();return new Date(n.getFullYear(),n.getMonth()+1,0).getDate()}

function dSubmit(){
  const k=tKey();const d=dGet();if(d[k]&&!confirm('今天已记过梦，覆盖吗？'))return;
  const b=document.getElementById('dBody').value.trim();const s=document.getElementById('dScene').value.trim();const t=document.getElementById('dStory').value.trim();
  if(!b&&!s&&!t){toast('写点什么再提交吧','toast-purple');return}
  d[k]={date:k,dreamBody:b,dreamScene:s,dreamStory:t,timestamp:new Date().toISOString()};dSet(d);
  toast('梦记已保存 ✓','toast-purple');
  document.getElementById('dBody').value='';document.getElementById('dScene').value='';document.getElementById('dStory').value='';
  dRenderAll();
}

function dHeader(){const n=new Date();document.getElementById('dreamDateBadge').textContent=['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'][n.getMonth()]+' · '+tKey()}

function dCal(){
  const g=document.getElementById('dCalendar');g.innerHTML='';const d=dGet();const n=new Date();const y=n.getFullYear();const m=n.getMonth();const days=mDays();
  for(let i=1;i<=days;i++){const d2=new Date(y,m,i);const k=d2.getFullYear()+'-'+String(d2.getMonth()+1).padStart(2,'0')+'-'+String(d2.getDate()).padStart(2,'0');
  const dv=document.createElement('div');dv.className='cal-day';if(d[k])dv.classList.add('done','done-purple');if(k===tKey())dv.classList.add('today');
  const nm=document.createElement('span');nm.className='num-small';nm.textContent=i;dv.appendChild(nm);
  const dt=document.createElement('span');dt.style.fontSize='14px';dt.textContent=d[k]?'🌙':'';dv.appendChild(dt);g.appendChild(dv)}
}

function dRec(){
  const l=document.getElementById('dRecords');const d=dGet();const es=Object.values(d).sort((a,b)=>b.timestamp.localeCompare(a.timestamp));
  if(!es.length){l.innerHTML='<div style="text-align:center;color:var(--dim);padding:20px">还没有梦记记录</div>';return}
  l.innerHTML='';es.forEach(e=>{const dv=document.createElement('div');dv.className='entry-item m-item';
  let h='<div class="date">'+e.date+'</div>';if(e.dreamBody)h+='<div class="dream-line"><span class="tag">① </span>'+esc(e.dreamBody)+'</div>';
  if(e.dreamScene)h+='<div class="dream-line"><span class="tag">② </span>'+esc(e.dreamScene)+'</div>';
  if(e.dreamStory)h+='<div class="dream-line"><span class="tag">③ </span>'+esc(e.dreamStory)+'</div>';dv.innerHTML=h;l.appendChild(dv)})
}

function showDTab(t){document.querySelectorAll('#pageDream .view-btn').forEach(b=>b.classList.remove('active-purple'));['dPanelCheck','dPanelView','dPanelRecords'].forEach(id=>document.getElementById(id).classList.add('hidden'));
if(t==='check'){document.getElementById('dTabCheck').classList.add('active-purple');document.getElementById('dPanelCheck').classList.remove('hidden')}
else if(t==='view'){document.getElementById('dTabView').classList.add('active-purple');document.getElementById('dPanelView').classList.remove('hidden');dCal()}
else{document.getElementById('dTabRecords').classList.add('active-purple');document.getElementById('dPanelRecords').classList.remove('hidden');dRec()}}
function dRenderAll(){dHeader();if(!document.getElementById('dPanelView').classList.contains('hidden'))dCal();if(!document.getElementById('dPanelRecords').classList.contains('hidden'))dRec()}

function dExport(){const d=JSON.parse(localStorage.getItem(DK))||{};const es=Object.values(d).sort((a,b)=>a.timestamp.localeCompare(b.timestamp));if(!es.length){toast('没有记录可导出','toast-purple');return}
const b=new Blob([JSON.stringify(es,null,2)],{type:'application/json'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download='dream-'+tKey()+'.json';a.click();URL.revokeObjectURL(u);toast('已导出','toast-purple')}
function dImportData(e){const f=e.target.files[0];if(!f)return;new FileReader().onload=function(ev){try{const es=JSON.parse(ev.target.result);if(!Array.isArray(es)){toast('格式不对','toast-purple');return}
const d=JSON.parse(localStorage.getItem(DK))||{};let c=0;es.forEach(function(x){if(x.date&&!d[x.date]){d[x.date]=x;c++}});localStorage.setItem(DK,JSON.stringify(d));toast('导入 '+c+' 条','toast-purple');dRenderAll()}catch(err){toast('解析失败','toast-purple')}}.readAsText(f);e.target.value=''}
function dBackup(){const d=JSON.parse(localStorage.getItem(DK))||{};const es=Object.values(d);if(!es.length){toast('没有记录','toast-purple');return}
const j=JSON.stringify(es);const o=document.createElement('div');o.className='modal-overlay';o.onclick=function(ev){if(ev.target===o)document.body.removeChild(o)};
o.innerHTML='<div class="modal-box" style="border-color:var(--purple)"><div class="modal-title" style="color:var(--purple)">🔐 备份码</div><p style="font-size:12px;color:var(--dim);margin-bottom:10px">复制后到另一台设备点「📤 导入」</p><textarea id="dCode" readonly>'+j+'</textarea><div class="modal-actions"><button class="btn-pri-purple" onclick="document.getElementById(\'dCode\').select();document.execCommand(\'copy\');toast(\'已复制\',\'toast-purple\')">📋 复制</button><button class="btn-sec" onclick="this.closest(\'.modal-overlay\').remove()">关闭</button></div></div>';document.body.appendChild(o);const ta=document.getElementById('dCode');ta.select();try{document.execCommand('copy');toast('已复制到剪贴板','toast-purple')}catch(e){}}

// ===================== 晚间日课 =====================
const EK='riji_evening_checkin';const SD='2026-07-09';const TD=90;
function eGet(){try{return JSON.parse(localStorage.getItem(EK))||{}}catch{return{}}}
function eSet(d){localStorage.setItem(EK,JSON.stringify(d))}
function eDay(dateStr){const s=new Date(SD);const c=new Date(dateStr);return Math.max(1,Math.min(Math.floor((c-s)/86400000)+1,TD))}
function eToday(){return eDay(tKey())}
let eAsked='';
function eToggle(el,v){const p=el.parentElement;p.querySelectorAll('.check-item').forEach(c=>c.classList.remove('active-yes','active-no'));
if(el.classList.contains('active-yes')||el.classList.contains('active-no')){eAsked='';return}
if(v==='yes')el.classList.add('active-yes');else el.classList.add('active-no');eAsked=v==='yes'?'问了':v==='no'?'没问':'忘了'}

function eSubmit(){
  const k=tKey();const d=eGet();if(d[k]&&!confirm('今天已打卡，覆盖吗？'))return;
  const s=document.getElementById('eSelf').value.trim();const b=document.getElementById('eBody').value.trim();
  const bf=document.getElementById('eBodyFeel').value.trim();const em=document.getElementById('eEmotion').value.trim();const t=document.getElementById('eThought').value.trim();
  if(!s&&!b&&!bf&&!em&&!t&&!eAsked){toast('写点什么再提交吧','toast-gold');return}
  d[k]={date:k,day:eToday(),self:s,body:b,asked:eAsked,bodyFeel:bf,emotion:em,thought:t,timestamp:new Date().toISOString()};eSet(d);
  toast('Day '+eToday()+' 已保存 ✓','toast-gold');eAsked='';
  document.getElementById('eSelf').value='';document.getElementById('eBody').value='';document.getElementById('eBodyFeel').value='';document.getElementById('eEmotion').value='';document.getElementById('eThought').value='';
  document.querySelectorAll('#pageEvening .check-item').forEach(c=>c.classList.remove('active-yes','active-no'));eAsked='';eRenderAll();
}

function eHeader(){
  const n=eToday();document.getElementById('eDayBadge').textContent='Day '+Math.min(n,90);document.getElementById('eDayLabel').textContent='第'+Math.min(n,90)+'天';
  document.getElementById('eProgress').style.width=Math.round((Math.min(n,90)/90)*100)+'%';
}

function eCal(){
  const g=document.getElementById('eCalendar');g.innerHTML='';const d=eGet();
  for(let i=1;i<=TD;i++){const d2=new Date(SD);d2.setDate(d2.getDate()+i-1);const k=d2.getFullYear()+'-'+String(d2.getMonth()+1).padStart(2,'0')+'-'+String(d2.getDate()).padStart(2,'0');
  const dv=document.createElement('div');dv.className='cal-day';if(d[k])dv.classList.add('done','done-gold');if(k===tKey())dv.classList.add('today');
  const nm=document.createElement('span');nm.className='num-small';nm.textContent=i;dv.appendChild(nm);
  const dt=document.createElement('span');dt.style.fontSize='14px';dt.textContent=d[k]?'✓':'';dv.appendChild(dt);g.appendChild(dv)}
}

function eRec(){
  const l=document.getElementById('eRecords');const d=eGet();const es=Object.values(d).sort((a,b)=>b.timestamp.localeCompare(a.timestamp));
  if(!es.length){l.innerHTML='<div style="text-align:center;color:var(--dim);padding:20px">还没有打卡记录</div>';return}
  l.innerHTML='';es.forEach(e=>{const dv=document.createElement('div');dv.className='entry-item e-item';
  let h='<div class="date">Day '+e.day+' · '+e.date+'</div><div class="content">';
  if(e.self)h+='<div>✦ '+esc(e.self)+'</div>';if(e.body)h+='<div>✦ '+esc(e.body)+'</div>';if(e.asked)h+='<div>✦ 问了自己吗：'+esc(e.asked)+'</div>';h+='</div>';
  if(e.bodyFeel||e.emotion||e.thought){h+='<div class="sanjie">';if(e.bodyFeel)h+='身体：'+esc(e.bodyFeel)+'<br>';if(e.emotion)h+='情绪：'+esc(e.emotion)+'<br>';if(e.thought)h+='想法：'+esc(e.thought);h+='</div>'}
  dv.innerHTML=h;l.appendChild(dv)})
}

function showETab(t){document.querySelectorAll('#pageEvening .view-btn').forEach(b=>b.classList.remove('active-gold'));['ePanelCheck','ePanelView','ePanelRecords'].forEach(id=>document.getElementById(id).classList.add('hidden'));
if(t==='check'){document.getElementById('eTabCheck').classList.add('active-gold');document.getElementById('ePanelCheck').classList.remove('hidden')}
else if(t==='view'){document.getElementById('eTabView').classList.add('active-gold');document.getElementById('ePanelView').classList.remove('hidden');eCal()}
else{document.getElementById('eTabRecords').classList.add('active-gold');document.getElementById('ePanelRecords').classList.remove('hidden');eRec()}}
function eRenderAll(){eHeader();if(!document.getElementById('ePanelView').classList.contains('hidden'))eCal();if(!document.getElementById('ePanelRecords').classList.contains('hidden'))eRec()}

function eExport(){const d=JSON.parse(localStorage.getItem(EK))||{};const es=Object.values(d).sort((a,b)=>a.timestamp.localeCompare(b.timestamp));if(!es.length){toast('没有记录可导出','toast-gold');return}
const b=new Blob([JSON.stringify(es,null,2)],{type:'application/json'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download='evening-'+tKey()+'.json';a.click();URL.revokeObjectURL(u);toast('已导出','toast-gold')}
function eImportData(e){const f=e.target.files[0];if(!f)return;new FileReader().onload=function(ev){try{const es=JSON.parse(ev.target.result);if(!Array.isArray(es)){toast('格式不对','toast-gold');return}
const d=JSON.parse(localStorage.getItem(EK))||{};let c=0;es.forEach(function(x){if(x.date&&x.day&&!d[x.date]){d[x.date]=x;c++}});localStorage.setItem(EK,JSON.stringify(d));toast('导入 '+c+' 条','toast-gold');eRenderAll()}catch(err){toast('解析失败','toast-gold')}}.readAsText(f);e.target.value=''}
function eBackup(){const d=JSON.parse(localStorage.getItem(EK))||{};const es=Object.values(d);if(!es.length){toast('没有记录','toast-gold');return}
const j=JSON.stringify(es);const o=document.createElement('div');o.className='modal-overlay';o.onclick=function(ev){if(ev.target===o)document.body.removeChild(o)};
o.innerHTML='<div class="modal-box" style="border-color:var(--gold)"><div class="modal-title" style="color:var(--gold)">🔐 备份码</div><p style="font-size:12px;color:var(--dim);margin-bottom:10px">复制后到另一台设备点「📤 导入」</p><textarea id="eCode" readonly>'+j+'</textarea><div class="modal-actions"><button class="btn-pri-gold" onclick="document.getElementById(\'eCode\').select();document.execCommand(\'copy\');toast(\'已复制\',\'toast-gold\')">📋 复制</button><button class="btn-sec" onclick="this.closest(\'.modal-overlay\').remove()">关闭</button></div></div>';document.body.appendChild(o);const ta=document.getElementById('eCode');ta.select();try{document.execCommand('copy');toast('已复制到剪贴板','toast-gold')}catch(e){}}

function esc(s){return s.replace(/</g,'&lt;').replace(/>/g,'&gt;')}
</script>
